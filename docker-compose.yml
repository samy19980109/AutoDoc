version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: autodoc
      POSTGRES_PASSWORD: autodoc
      POSTGRES_DB: autodoc
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autodoc"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      AUTODOC_DATABASE_URL: postgresql://autodoc:autodoc@postgres:5432/autodoc
      AUTODOC_REDIS_URL: redis://redis:6379/0
      AUTODOC_CELERY_BROKER_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  github-webhook:
    build:
      context: .
      dockerfile: services/github-webhook/Dockerfile
    ports:
      - "8001:8001"
    env_file: .env
    environment:
      AUTODOC_DATABASE_URL: postgresql://autodoc:autodoc@postgres:5432/autodoc
      AUTODOC_REDIS_URL: redis://redis:6379/0
      AUTODOC_CELERY_BROKER_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  doc-processor:
    build:
      context: .
      dockerfile: services/doc-processor/Dockerfile
    env_file: .env
    environment:
      AUTODOC_DATABASE_URL: postgresql://autodoc:autodoc@postgres:5432/autodoc
      AUTODOC_REDIS_URL: redis://redis:6379/0
      AUTODOC_CELERY_BROKER_URL: redis://redis:6379/0
      AUTODOC_CELERY_RESULT_BACKEND: redis://redis:6379/1
      AUTODOC_DOC_SYNC_URL: http://doc-sync:8002
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  doc-sync:
    build:
      context: .
      dockerfile: services/doc-sync/Dockerfile
    ports:
      - "8002:8002"
    env_file: .env
    environment:
      AUTODOC_DATABASE_URL: postgresql://autodoc:autodoc@postgres:5432/autodoc
      AUTODOC_REDIS_URL: redis://redis:6379/0
      AUTODOC_NOTION_API_KEY: ${AUTODOC_NOTION_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy

  celery-beat:
    build:
      context: .
      dockerfile: services/doc-processor/Dockerfile
    command: celery -A celery_app:app beat --loglevel=info
    env_file: .env
    environment:
      AUTODOC_DATABASE_URL: postgresql://autodoc:autodoc@postgres:5432/autodoc
      AUTODOC_CELERY_BROKER_URL: redis://redis:6379/0
      AUTODOC_CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      redis:
        condition: service_healthy

volumes:
  pgdata:
